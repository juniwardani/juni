<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Pribadi</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    
    /* Efek interaktif untuk kartu menu */
    .menu-card {
      transition: all 0.2s ease;
    }
    
    .menu-card:hover {
      transform: translateY(-2px);
    }
    
    .menu-card:active {
      transform: scale(0.98);
    }
    
    /* Style khusus View Transition (Browser Native) */
    @view-transition { 
      navigation: auto; 
    }
  </style>
</head>

<body class="h-full bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 text-slate-800">

  <div class="h-full w-full flex flex-col overflow-auto">
    
    <!-- Header -->
    <header class="bg-gradient-to-r from-indigo-700 via-blue-700 to-cyan-600 px-6 py-6 shadow-xl">
      <h1 class="text-xl font-bold text-white text-center tracking-wide">Juni Wardani, S.Pd</h1>
      <p class="text-blue-100 text-sm text-center mt-2 font-medium">Aplikasi Pribadi</p>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-5">
      
      <!-- Navigation Grid -->
      <div class="grid grid-cols-2 gap-4 max-w-md mx-auto">

        <!-- Catatan -->
        <a href="catatan.html" class="menu-card bg-white rounded-2xl p-5 flex flex-col items-center justify-center shadow-xl border border-violet-100 text-decoration-none hover:shadow-2xl">
          <div class="w-14 h-14 bg-gradient-to-br from-violet-500 to-purple-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg">
            <i class="fa-solid fa-file-lines text-2xl text-white"></i>
          </div>
          <span class="text-slate-700 font-semibold text-sm text-center">Catatan</span>
        </a>

        <!-- Agenda Pribadi -->
        <a href="agenda.html" class="menu-card bg-white rounded-2xl p-5 flex flex-col items-center justify-center shadow-xl border border-teal-100 text-decoration-none hover:shadow-2xl">
          <div class="w-14 h-14 bg-gradient-to-br from-teal-500 to-teal-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg">
            <i class="fa-solid fa-calendar-days text-2xl text-white"></i>
          </div>
          <span class="text-slate-700 font-semibold text-sm text-center">Agenda Pribadi</span>
        </a>

        <!-- PDF to JPG -->
        <a href="pdfjpg.html" class="menu-card bg-white rounded-2xl p-5 flex flex-col items-center justify-center shadow-xl border border-rose-100 text-decoration-none hover:shadow-2xl">
          <div class="w-14 h-14 bg-gradient-to-br from-rose-500 to-pink-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg">
            <i class="fa-solid fa-file-image text-2xl text-white"></i>
          </div>
          <span class="text-slate-700 font-semibold text-sm text-center">PDF to JPG</span>
        </a>

        <!-- JPG ke PDF -->
        <a href="jpgpdf.html" class="menu-card bg-white rounded-2xl p-5 flex flex-col items-center justify-center shadow-xl border border-lime-100 text-decoration-none hover:shadow-2xl">
          <div class="w-14 h-14 bg-gradient-to-br from-lime-500 to-lime-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg">
            <i class="fa-solid fa-file-pdf text-2xl text-white"></i>
          </div>
          <span class="text-slate-700 font-semibold text-sm text-center">JPG ke PDF</span>
        </a>

        <!-- Merge PDF -->
        <a href="merge.html" class="menu-card bg-white rounded-2xl p-5 flex flex-col items-center justify-center shadow-xl border border-amber-100 text-decoration-none hover:shadow-2xl">
          <div class="w-14 h-14 bg-gradient-to-br from-amber-500 to-orange-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg">
            <i class="fa-solid fa-layer-group text-2xl text-white"></i>
          </div>
          <span class="text-slate-700 font-semibold text-sm text-center">Merge PDF</span>
        </a>

        <!-- Extract PDF -->
        <a href="extrak.html" class="menu-card bg-white rounded-2xl p-5 flex flex-col items-center justify-center shadow-xl border border-cyan-100 text-decoration-none hover:shadow-2xl">
          <div class="w-14 h-14 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg">
            <i class="fa-solid fa-file-export text-2xl text-white"></i>
          </div>
          <span class="text-slate-700 font-semibold text-sm text-center">Extract PDF</span>
        </a>

        <!-- Insert PDF -->
        <a href="insert.html" class="menu-card bg-white rounded-2xl p-5 flex flex-col items-center justify-center shadow-xl border border-sky-100 no-underline hover:shadow-2xl">
          <div class="w-14 h-14 bg-gradient-to-br from-sky-500 to-sky-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg">
            <i class="fa-solid fa-file-circle-plus text-2xl text-white"></i>
          </div>
          <span class="text-slate-700 font-semibold text-sm text-center">Insert PDF</span>
        </a>

        <!-- Tanda Tangan -->
        <a href="ttd.html" class="menu-card bg-white rounded-2xl p-5 flex flex-col items-center justify-center shadow-xl border border-fuchsia-100 text-decoration-none hover:shadow-2xl">
          <div class="w-14 h-14 bg-gradient-to-br from-fuchsia-500 to-fuchsia-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg">
            <i class="fa-solid fa-signature text-2xl text-white"></i>
          </div>
          <span class="text-slate-700 font-semibold text-sm text-center">Tanda Tangan</span>
        </a>

        <!-- jsPDF -->
        <a href="https://jspdf-delta.vercel.app/" target="_blank" rel="noopener noreferrer" class="menu-card bg-white rounded-2xl p-5 flex flex-col items-center justify-center shadow-xl border border-emerald-100 text-decoration-none hover:shadow-2xl">
          <div class="w-14 h-14 bg-gradient-to-br from-emerald-500 to-green-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg">
            <i class="fa-solid fa-link text-2xl text-white"></i>
          </div>
          <span class="text-slate-700 font-semibold text-sm text-center">jsPDF</span>
        </a>

        <!-- Supabase Manager -->
        <a href="supabase.html" class="menu-card bg-white rounded-2xl p-5 flex flex-col items-center justify-center shadow-xl border border-indigo-100 text-decoration-none hover:shadow-2xl">
          <div class="w-14 h-14 bg-gradient-to-br from-indigo-500 to-indigo-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg">
            <i class="fa-solid fa-database text-2xl text-white"></i>
          </div>
          <span class="text-slate-700 font-semibold text-sm text-center">Supabase Manager</span>
        </a>

        <!-- RTS (New Item) -->
        <a href="https://tahfidzktb.vercel.app/rts.html" class="menu-card bg-white rounded-2xl p-5 flex flex-col items-center justify-center shadow-xl border border-orange-100 text-decoration-none hover:shadow-2xl">
          <div class="w-14 h-14 bg-gradient-to-br from-orange-500 to-red-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg">
            <i class="fa-solid fa-book-quran text-2xl text-white"></i>
          </div>
          <span class="text-slate-700 font-semibold text-sm text-center">RTS</span>
        </a>

      </div>
    </main>

    <!-- Footer -->
    <footer class="px-4 py-4 text-center bg-white/50 backdrop-blur-sm border-t border-slate-200">
      <p class="text-slate-600 text-xs font-medium">© 2024 Juni Wardani, S.Pd</p>
    </footer>
  </div>

</body>
</html>
