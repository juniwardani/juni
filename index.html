<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Aplikasi Pribadi</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    
    /* Efek interaktif untuk kartu menu */
    .menu-card {
      transition: all 0.2s ease;
    }
    
    .menu-card:hover {
      transform: translateY(-2px);
    }
    
    .menu-card:active {
      transform: scale(0.98);
    }

    /* Animasi getar saat password salah */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    
    .shake-animation {
      animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
      border-color: #ef4444 !important; /* Merah */
    }
    
    @view-transition { 
      navigation: auto; 
    }
  </style>
</head>

<body class="h-full bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 text-slate-800">

  <!-- === HALAMAN LOGIN (OVERLAY) === -->
  <div id="login-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-900/70 backdrop-blur-sm p-4 transition-opacity duration-500">
    <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-8 border border-slate-100 transform transition-all">
      
      <!-- Ikon & Judul -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4">
          <i class="fa-solid fa-lock text-3xl text-white"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-800">Selamat Datang</h2>
        <p class="text-slate-500 text-sm mt-1">Silakan masuk untuk melanjutkan</p>
      </div>

      <!-- Form Login -->
      <div class="space-y-4">
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fa-solid fa-key text-slate-400"></i>
          </div>
          <input type="password" id="password-input" 
            class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-xl leading-5 bg-slate-50 placeholder-slate-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 ease-in-out sm:text-sm" 
            placeholder="Masukkan Password">
        </div>

        <!-- Pesan Error -->
        <p id="error-msg" class="text-red-500 text-xs text-center font-medium hidden opacity-0 transition-opacity duration-300">
          <i class="fa-solid fa-circle-exclamation mr-1"></i> Password salah!
        </p>

        <button onclick="checkLogin()" 
          class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-xl text-white bg-gradient-to-r from-indigo-700 to-blue-600 hover:from-indigo-800 hover:to-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 shadow-lg transform active:scale-95 transition-all">
          MASUK
        </button>
      </div>
      
      <p class="text-center text-xs text-slate-400 mt-6">© 2024 Juni Wardani, S.Pd</p>
    </div>
  </div>

  <!-- === KONTEN UTAMA APLIKASI (Awalnya Tersembunyi) === -->
  <!-- Tambahkan class 'hidden' agar tidak muncul sebelum login -->
  <div id="main-app" class="h-full w-full flex flex-col overflow-auto hidden opacity-0 transition-opacity duration-700">
    
    <!-- Header -->
    <header class="bg-gradient-to-r from-indigo-700 via-blue-700 to-cyan-600 px-6 py-6 shadow-xl relative z-10">
      <h1 class="text-xl font-bold text-white text-center tracking-wide">Juni Wardani, S.Pd</h1>
      <p class="text-blue-100 text-sm text-center mt-2 font-medium">Aplikasi Pribadi</p>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-5">
      
      <!-- Container Grid Kosong (Akan diisi oleh JavaScript) -->
      <div id="app-menu" class="grid grid-cols-2 gap-4 max-w-md mx-auto">
        <!-- Item menu akan muncul di sini secara otomatis -->
      </div>
      
    </main>

    <!-- Footer -->
    <footer class="px-4 py-4 text-center bg-white/50 backdrop-blur-sm border-t border-slate-200">
      <button onclick="logout()" class="text-slate-400 hover:text-red-500 text-xs transition-colors">
        <i class="fa-solid fa-right-from-bracket mr-1"></i> Keluar
      </button>
    </footer>
  </div>

  <!-- Script Data & Render Menu & Logika Login -->
  <script>
    // ==========================================
    // 1. LOGIKA LOGIN
    // ==========================================
    const CORRECT_PASSWORD = "j";
    
    const loginOverlay = document.getElementById('login-overlay');
    const mainApp = document.getElementById('main-app');
    const passwordInput = document.getElementById('password-input');
    const errorMsg = document.getElementById('error-msg');

    // Fokus otomatis ke input password saat load
    window.onload = function() {
      passwordInput.focus();
    };

    // Event listener untuk tombol Enter
    passwordInput.addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        checkLogin();
      }
    });

    function checkLogin() {
      const inputPass = passwordInput.value;

      if (inputPass === CORRECT_PASSWORD) {
        // Jika Benar
        loginSuccess();
      } else {
        // Jika Salah
        loginError();
      }
    }

    function loginSuccess() {
      // Sembunyikan login
      loginOverlay.classList.add('opacity-0');
      setTimeout(() => {
        loginOverlay.style.display = 'none';
        
        // Tampilkan Main App
        mainApp.classList.remove('hidden');
        // Sedikit delay agar transisi opacity berjalan
        setTimeout(() => {
          mainApp.classList.remove('opacity-0');
        }, 50);
        
      }, 500); // Sesuaikan dengan durasi transisi CSS
    }

    function loginError() {
      // Tampilkan pesan error
      errorMsg.classList.remove('hidden');
      // Trigger reflow agar animasi bisa dijalankan ulang
      void passwordInput.offsetWidth; 
      
      // Tambahkan class getar
      passwordInput.classList.add('shake-animation');
      passwordInput.classList.add('border-red-400', 'bg-red-50');
      
      // Tampilkan pesan text
      errorMsg.style.opacity = '1';

      // Hapus class getar setelah 400ms
      setTimeout(() => {
        passwordInput.classList.remove('shake-animation');
      }, 400);

      // Reset input style setelah user mengetik ulang
      passwordInput.addEventListener('input', function resetStyle() {
        passwordInput.classList.remove('border-red-400', 'bg-red-50');
        errorMsg.style.opacity = '0';
        errorMsg.classList.add('hidden');
        passwordInput.removeEventListener('input', resetStyle);
      });
    }

    function logout() {
      // Reload halaman untuk kembali ke state awal
      window.location.reload();
    }

    // ==========================================
    // 2. DATA MENU (Sesuai permintaan awal)
    // ==========================================
    const menuItems = [
      {
        nama: "Catatan",
        link: "catatan.html",
        icon: "fa-file-lines",
        warnaBg: "from-violet-500 to-purple-600",
        warnaBorder: "border-violet-100"
      },
      {
        nama: "Agenda Pribadi",
        link: "agenda.html",
        icon: "fa-calendar-days",
        warnaBg: "from-teal-500 to-teal-600",
        warnaBorder: "border-teal-100"
      },
      {
        nama: "PDF to JPG",
        link: "pdfjpg.html",
        icon: "fa-file-image",
        warnaBg: "from-rose-500 to-pink-600",
        warnaBorder: "border-rose-100"
      },
      {
        nama: "JPG ke PDF",
        link: "jpgpdf.html",
        icon: "fa-file-pdf",
        warnaBg: "from-lime-500 to-lime-600",
        warnaBorder: "border-lime-100"
      },
      {
        nama: "Merge PDF",
        link: "merge.html",
        icon: "fa-layer-group",
        warnaBg: "from-amber-500 to-orange-600",
        warnaBorder: "border-amber-100"
      },
      {
        nama: "Extract PDF",
        link: "extrak.html",
        icon: "fa-file-export",
        warnaBg: "from-cyan-500 to-blue-600",
        warnaBorder: "border-cyan-100"
      },
      {
        nama: "Insert PDF",
        link: "insert.html",
        icon: "fa-file-circle-plus",
        warnaBg: "from-sky-500 to-sky-600",
        warnaBorder: "border-sky-100"
      },
      {
        nama: "Tanda Tangan",
        link: "ttd.html",
        icon: "fa-signature",
        warnaBg: "from-fuchsia-500 to-fuchsia-600",
        warnaBorder: "border-fuchsia-100"
      },
      {
        nama: "jsPDF",
        link: "https://jspdf-delta.vercel.app/",
        icon: "fa-link",
        warnaBg: "from-emerald-500 to-green-600",
        warnaBorder: "border-emerald-100",
        isNewTab: true
      },
      {
        nama: "Supabase Manager",
        link: "supabase.html",
        icon: "fa-database",
        warnaBg: "from-indigo-500 to-indigo-600",
        warnaBorder: "border-indigo-100"
      },
      {
        nama: "OCR PDF",
        link: "https://ocr-dun.vercel.app/",
        icon: "fa-font",
        warnaBg: "from-slate-500 to-slate-700",
        warnaBorder: "border-slate-100"
      },
      {  
        nama: "Penilaian Diklat",  
        link: "hasildiklat.html",  
        icon: "fa-clipboard-check",  
        warnaBg: "from-green-500 to-emerald-600",  
        warnaBorder: "border-green-100"  
      },
      {
        nama: "RTS",
        link: "https://tahfidzktb.vercel.app/rts.html",
        icon: "fa-book-quran",
        warnaBg: "from-orange-500 to-red-600",
        warnaBorder: "border-orange-100"
      }
    ];

    // ==========================================
    // 3. FUNGSI RENDER MENU
    // ==========================================
    const container = document.getElementById('app-menu');
    
    // Bersihkan container
    container.innerHTML = '';

    // Loop melalui data dan buat HTML
    menuItems.forEach(item => {
      // Cek apakah perlu target="_blank"
      const targetAttr = item.isNewTab ? 'target="_blank" rel="noopener noreferrer"' : '';

      const cardHTML = `
        <a href="${item.link}" ${targetAttr} class="menu-card bg-white rounded-2xl p-5 flex flex-col items-center justify-center shadow-xl border ${item.warnaBorder} text-decoration-none hover:shadow-2xl cursor-pointer">
          <div class="w-14 h-14 bg-gradient-to-br ${item.warnaBg} rounded-2xl flex items-center justify-center mb-3 shadow-lg">
            <i class="fa-solid ${item.icon} text-2xl text-white"></i>
          </div>
          <span class="text-slate-700 font-semibold text-sm text-center">${item.nama}</span>
        </a>
      `;
      
      // Masukkan ke dalam container
      container.innerHTML += cardHTML;
    });
  </script>
</body>
</html>
