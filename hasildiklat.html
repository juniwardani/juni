<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ceklist Santri Kompak</title>
    <style>
        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            font-size: 13px; /* Ukuran font kecil agar kompak */
            padding-bottom: 40px;
        }

        /* Container Utama */
        .container {
            max-width: 480px; /* Batas lebar ala smartphone */
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background-color: #2c3e50;
            color: #fff;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: lowercase; /* Sesuai request: huruf kecil */
        }

        /* Controls Area */
        .controls-area {
            padding: 10px 15px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        /* Filter Pembimbing */
        .filter-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        label {
            font-weight: bold;
            white-space: nowrap;
            text-transform: lowercase;
            color: #555;
        }

        select {
            flex-grow: 1;
            padding: 8px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #fff;
            text-transform: lowercase; /* Opsi juga huruf kecil */
        }

        /* Pencarian Santri */
        .search-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-input-wrapper {
            flex-grow: 1;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-transform: lowercase; /* Input huruf kecil */
        }

        button.reset-btn {
            background: none;
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            text-transform: lowercase;
            white-space: nowrap;
        }

        /* Tabel Kompak */
        .table-wrapper {
            overflow-x: auto;
            flex-grow: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-transform: lowercase; /* Sesuai request: isi tabel huruf kecil */
        }

        thead {
            background-color: #ecf0f1;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            text-align: left;
            padding: 10px 8px;
            font-size: 12px;
            font-weight: 700;
            color: #555;
            border-bottom: 2px solid #bdc3c7;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }

        /* Kolom No */
        td.no-col {
            width: 40px;
            text-align: center;
            color: #7f8c8d;
            font-size: 11px;
        }

        /* Kolom Nama */
        td.nama-col {
            font-weight: 500;
            color: #2c3e50;
        }
        
        .pembimbing-label {
            display: block;
            font-size: 10px;
            color: #95a5a6;
            margin-top: 2px;
        }

        /* Kolom Aksi (Checkbox) */
        td.aksi-col {
            width: 50px;
            text-align: center;
        }

        /* Styling Checkbox */
        input[type="checkbox"] {
            width: 24px;
            height: 24px;
            accent-color: #27ae60;
            cursor: pointer;
        }

        /* State Checked */
        tr.checked td.nama-col {
            color: #95a5a6;
            text-decoration: line-through;
        }
        
        tr.checked {
            background-color: #f9f9f9;
        }

        /* Status Bar (Info) */
        .status-bar {
            padding: 10px 15px;
            background: #e8f6f3;
            border-top: 1px solid #d0ece7;
            font-size: 11px;
            color: #16a085;
            text-align: center;
            text-transform: lowercase;
        }

        /* Empty State */
        .empty-state {
            padding: 20px;
            text-align: center;
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ceklist kehadiran santri</h1>
    </header>

    <div class="controls-area">
        <!-- Filter Pembimbing -->
        <div class="filter-row">
            <label for="pembimbingFilter">filter:</label>
            <select id="pembimbingFilter">
                <option value="all">semua pembimbing</option>
                <!-- Opsi akan diisi oleh JavaScript -->
            </select>
        </div>

        <!-- Pencarian Santri dengan Autocomplete -->
        <div class="search-row">
            <label for="searchSantri" style="font-size: 11px; color: #777;">cari:</label>
            <div class="search-input-wrapper">
                <input type="text" id="searchSantri" list="santriList" placeholder="ketik nama santri..." autocomplete="off">
                <!-- Data Autocomplete -->
                <datalist id="santriList">
                    <!-- Opsi diisi otomatis oleh JS -->
                </datalist>
            </div>
            <button class="reset-btn" onclick="resetData()">reset</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="santriTable">
            <thead>
                <tr>
                    <th style="width: 40px;">no</th>
                    <th>nama santri</th>
                    <th style="width: 50px; text-align: center;">aksi</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Data akan dimuat di sini -->
            </tbody>
        </table>
    </div>

    <div class="status-bar" id="statusBar">
        memuat data...
    </div>
</div>

    // Kunci untuk LocalStorage
    const STORAGE_KEY = 'ceklist_santri_data_v2';

    // State Aplikasi
    let checkedList = new Set(); // Menyimpan nama santri yang sudah dicentang

    // 1. Inisialisasi Aplikasi
    document.addEventListener('DOMContentLoaded', () => {
        loadData();
        sortData();
        populateFilter();
        populateDatalist(); // Memanggil fungsi baru untuk autocomplete
        renderTable('all', ''); // Render awal
        
        // Event Listener Filter Pembimbing
        document.getElementById('pembimbingFilter').addEventListener('change', handleFilterChange);
        
        // Event Listener Pencarian (Input)
        document.getElementById('searchSantri').addEventListener('input', handleFilterChange);
    });

    // 2. Fungsi Load Data dari LocalStorage
    function loadData() {
        const storedData = localStorage.getItem(STORAGE_KEY);
        if (storedData) {
            const parsed = JSON.parse(storedData);
            checkedList = new Set(parsed);
        }
    }

    // 3. Fungsi Simpan Data ke LocalStorage
    function saveData() {
        const arrayToStore = Array.from(checkedList);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(arrayToStore));
        updateStatus();
    }

    // 4. Mengurutkan Data (Pembimbing -> Abjad Nama)
    function sortData() {
        santriPembimbing.sort((a, b) => {
            // Urutkan berdasarkan Nama Pembimbing
            const comparePembimbing = a.pembimbing.localeCompare(b.pembimbing, 'id');
            if (comparePembimbing !== 0) {
                return comparePembimbing;
            }
            // Jika pembimbing sama, urutkan berdasarkan Nama Santri (Abjadi)
            return a.nama.localeCompare(b.nama, 'id');
        });
    }

    // 5. Mengisi Dropdown Filter
    function populateFilter() {
        const select = document.getElementById('pembimbingFilter');
        // Ambil daftar nama pembimbing unik
        const mentors = [...new Set(santriPembimbing.map(s => s.pembimbing))];
        
        // Urutkan pembimbing agar rapi di dropdown
        mentors.sort((a, b) => a.localeCompare(b, 'id'));

        mentors.forEach(mentor => {
            const option = document.createElement('option');
            option.value = mentor;
            option.textContent = mentor.toLowerCase(); // Tampilan huruf kecil
            select.appendChild(option);
        });
    }

    // 5b. Mengisi Datalist untuk Autocomplete
    function populateDatalist() {
        const datalist = document.getElementById('santriList');
        
        // Ambil semua nama santri dan urutkan
        const names = santriPembimbing.map(s => s.nama).sort((a, b) => a.localeCompare(b, 'id'));

        names.forEach(name => {
            const option = document.createElement('option');
            option.value = name;
            datalist.appendChild(option);
        });
    }

    // 6. Handle Filter Change (Baik filter pembimbing maupun pencarian)
    function handleFilterChange() {
        const mentorValue = document.getElementById('pembimbingFilter').value;
        const searchValue = document.getElementById('searchSantri').value;
        renderTable(mentorValue, searchValue);
    }

    // 7. Render Tabel (Diperbarui mendukung search term)
    function renderTable(filterMentor, searchTerm) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        let counter = 1;
        
        // Normalisasi searchTerm ke huruf kecil untuk pencarian tidak case-sensitive
        const term = searchTerm.toLowerCase();

        // Filter data (Gabungan Filter Pembimbing DAN Pencarian Nama)
        const filteredData = santriPembimbing.filter(item => {
            const matchMentor = (filterMentor === 'all') || (item.pembimbing === filterMentor);
            const matchName = item.nama.toLowerCase().includes(term);
            return matchMentor && matchName;
        });

        if (filteredData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="empty-state">data tidak ditemukan</td></tr>';
            return;
        }

        filteredData.forEach(santri => {
            const tr = document.createElement('tr');
            const isChecked = checkedList.has(santri.nama);

            // Tambahkan class 'checked' jika dicentang untuk styling
            if (isChecked) {
                tr.classList.add('checked');
            }

            tr.innerHTML = `
                <td class="no-col">${counter}.</td>
                <td class="nama-col">
                    ${santri.nama}
                    <span class="pembimbing-label">${santri.pembimbing}</span>
                </td>
                <td class="aksi-col">
                    <input type="checkbox" 
                        ${isChecked ? 'checked' : ''} 
                        onchange="toggleCheck('${santri.nama}', this)">
                </td>
            `;
            tbody.appendChild(tr);
            counter++;
        });
    }

    // 8. Handle Centang (Action)
    function toggleCheck(nama, checkbox) {
        if (checkbox.checked) {
            checkedList.add(nama);
        } else {
            checkedList.delete(nama);
        }
        saveData();
        
        // Update visual baris tanpa re-render ulang seluruh tabel (lebih efisien)
        const row = checkbox.closest('tr');
        if (checkbox.checked) {
            row.classList.add('checked');
        } else {
            row.classList.remove('checked');
        }
    }

    // 9. Update Status Bar
    function updateStatus() {
        const total = santriPembimbing.length;
        const checked = checkedList.size;
        const statusBar = document.getElementById('statusBar');
        statusBar.textContent = `tercentang: ${checked} dari ${total} santri`;
    }

    // 10. Reset Data
    function resetData() {
        if(confirm('hapus semua data centang?')) {
            checkedList.clear();
            saveData();
            // Reset input pencarian
            document.getElementById('searchSantri').value = '';
            // Re-render
            const filterValue = document.getElementById('pembimbingFilter').value;
            renderTable(filterValue, '');
        }
    }
</script>

</body>
</html>
