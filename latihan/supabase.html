<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Supabase</title>
</head>
<style>
/* Tanda bintang (*) adalah selector universal.
Artinya:
Terapkan aturan ini ke semua elemen HTML. */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #9cf885, #6edc8d);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 15px;
}

/* Wrapper utama */
.main-card {
    width: 100%;
    max-width: 600px;
}

/* Navigasi Tab */
.tab-nav {
    display: flex;
    background: #ffffff;
    padding: 8px;
    border-radius: 16px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

.tab-btn {
    flex: 1;
    border: none;
    background: transparent;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    transition: all .3s ease;
}

.tab-btn:hover {
    background: #f1f5f9;
}

.tab-btn.active {
    background: #4a90e2;
    color: white;
    box-shadow: 0 4px 12px rgba(74,144,226,.3);
}

/* Isi Tab */
.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

/* Card */
.container,
.container2 {
    width: 100%;
    background: #ffffff;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,.08);
}

/* Judul */
.container h1,
.container2 h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #1e293b;
    font-size: 24px;
}

/* Input Group */
.inputSupabase,
.bacaSupabase {
    margin-bottom: 18px;
}

.inputSupabase label,
.bacaSupabase label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #334155;
}

/* Input */
input {
    width: 100%;
    padding: 13px 15px;
    border: 1px solid #dbe2ea;
    border-radius: 12px;
    font-size: 15px;
    transition: .3s;
}

input:focus {
    outline: none;
    border-color: #4a90e2;
    box-shadow: 0 0 0 4px rgba(74,144,226,.15);
}

/* Tombol */
#tombol {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg,#4a90e2,#357abd);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: .3s;
}

#tombol:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(74,144,226,.3);
}

/* Data Hasil */


/* Mobile */
@media (max-width: 576px) {
    .container,
    .container2 {
        padding: 20px;
    }

    .container h1,
    .container2 h1 {
        font-size: 20px;
    }

    .tab-btn {
        font-size: 14px;
        padding: 12px;
    }
}

/* Data Hasil */
table {
    width: 100%;
    border-collapse: collapse;
    overflow: hidden;
    border-radius: 14px;
    background: #fff;
    box-shadow: 0 4px 15px rgba(0,0,0,.05);
}

thead {
    background: linear-gradient(135deg,#4a90e2,#357abd);
    color: white;
}

thead th {
    padding: 14px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
}

tbody td {
    padding: 14px;
    border-bottom: 1px solid #edf2f7;
    color: #334155;
    font-size: 14px;
}

tbody tr {
    transition: .2s;
}

tbody tr:hover {
    background: #f8fafc;
}

tbody tr:last-child td {
    border-bottom: none;
}

/* Kolom nomor */
tbody td:first-child,
thead th:first-child {
    width: 60px;
    text-align: center;
}

/* Pesan kosong */
tbody td[colspan] {
    text-align: center;
    padding: 25px;
    color: #64748b;
}

/* Responsive */
@media (max-width: 576px) {

    table {
        font-size: 13px;
    }

    thead th,
    tbody td {
        padding: 10px;
    }

    tbody td:first-child,
    thead th:first-child {
        width: 45px;
    }
}

</style>
<body>
<div class="main-card">

    <!-- Navigasi Tab -->
    <div class="tab-nav">
        <button class="tab-btn active" onclick="bukaTab('inputTab', this)">
            Input Data
        </button>

        <button class="tab-btn" onclick="bukaTab('hasilTab', this)">
            Data Tersimpan
        </button>
    </div>

    <!-- Tab Input -->
    <div id="inputTab" class="tab-content active">
        <div class="container">
            <h1>Latihan CRUD Supabase</h1>

            <div class="inputSupabase">
                <label for="dataNama">Data Yang Disimpan</label>
                <input type="text" id="dataNama" placeholder="Masukkan data">
            </div>

            <div class="inputSupabase">
                <label for="tempatLahir">Tempat Lahir</label>
                <input type="text" id="tempatLahir" placeholder="Masukkan tempat lahir">
            </div>

            <button id="tombol">SIMPAN DATA</button>
        </div>
    </div>

    <!-- Tab Hasil -->
<div id="hasilTab" class="tab-content">
    <div class="container2">
        <h1>Data Tersimpan</h1>

        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama</th>
                    <th>Tempat Lahir</th>
                </tr>
            </thead>
            <tbody id="dataTabel">
                <tr>
                    <td colspan="3">Memuat data...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</div>


</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
<script src="script/simpan.js"></script>

<script>
function bukaTab(idTab) {

    document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
    });

    document.getElementById(idTab).classList.add('active');

    event.target.classList.add('active');
};

async function tampilkanData() {

    const { data, error } = await supabaseClient
        .from('latihan')
        .select('nama, tempatLahir');

    if (error) {
        console.error(error);

        document.getElementById('dataTabel').innerHTML = `
            <tr>
                <td colspan="3">Gagal mengambil data</td>
            </tr>
        `;
        return;
    }

    let html = '';

    data.forEach((item, index) => {
        html += `
            <tr>
                <td>${index + 1}</td>
                <td>${item.nama}</td>
                <td>${item.tempatLahir}</td>
            </tr>
        `;
    });

    document.getElementById('dataTabel').innerHTML = html;
}

tampilkanData();
</script>
</html>
