<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Supabase</title>
</head>
<style>
/* Tanda bintang (*) adalah selector universal.
Artinya:
Terapkan aturan ini ke semua elemen HTML. */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #9cf885, #6edc8d);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 15px;
}

/* Wrapper utama */
.main-card {
    width: 100%;
    max-width: 600px;
}

/* Navigasi Tab */
.tab-nav {
    display: flex;
    background: #ffffff;
    padding: 8px;
    border-radius: 16px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

.tab-btn {
    flex: 1;
    border: none;
    background: transparent;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    transition: all .3s ease;
}

.tab-btn:hover {
    background: #f1f5f9;
}

.tab-btn.active {
    background: #4a90e2;
    color: white;
    box-shadow: 0 4px 12px rgba(74,144,226,.3);
}

/* Isi Tab */
.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

/* Card */
.container,
.container2 {
    width: 100%;
    background: #ffffff;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,.08);
}

/* Judul */
.container h1,
.container2 h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #1e293b;
    font-size: 24px;
}

/* Input Group */
.inputSupabase,
.bacaSupabase {
    margin-bottom: 18px;
}

.inputSupabase label,
.bacaSupabase label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #334155;
}

/* Input */
input {
    width: 100%;
    padding: 13px 15px;
    border: 1px solid #dbe2ea;
    border-radius: 12px;
    font-size: 15px;
    transition: .3s;
}

input:focus {
    outline: none;
    border-color: #4a90e2;
    box-shadow: 0 0 0 4px rgba(74,144,226,.15);
}

/* Tombol */
#tombol {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg,#4a90e2,#357abd);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: .3s;
}

#tombol:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(74,144,226,.3);
}

/* Data Hasil */
#namaTersimpan,
#tempatTersimpan {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    padding: 12px 15px;
    border-radius: 12px;
    min-height: 48px;
    display: flex;
    align-items: center;
    color: #334155;
}

/* Mobile */
@media (max-width: 576px) {
    .container,
    .container2 {
        padding: 20px;
    }

    .container h1,
    .container2 h1 {
        font-size: 20px;
    }

    .tab-btn {
        font-size: 14px;
        padding: 12px;
    }
}

</style>
<body>
<div class="main-card">

    <!-- Navigasi Tab -->
    <div class="tab-nav">
        <button class="tab-btn active" onclick="bukaTab('inputTab', this)">
            Input Data
        </button>

        <button class="tab-btn" onclick="bukaTab('hasilTab', this)">
            Data Tersimpan
        </button>
    </div>

    <!-- Tab Input -->
    <div id="inputTab" class="tab-content active">
        <div class="container">
            <h1>Latihan CRUD Supabase</h1>

            <div class="inputSupabase">
                <label for="dataNama">Data Yang Disimpan</label>
                <input type="text" id="dataNama" placeholder="Masukkan data">
            </div>

            <div class="inputSupabase">
                <label for="tempatLahir">Tempat Lahir</label>
                <input type="text" id="tempatLahir" placeholder="Masukkan tempat lahir">
            </div>

            <button id="tombol">SIMPAN DATA</button>
        </div>
    </div>

    <!-- Tab Hasil -->
    <div id="hasilTab" class="tab-content">
        <div class="container2">
            <h1>Data Tersimpan</h1>

            <div class="bacaSupabase">
                <label>Nama</label>
                <div id="namaTersimpan"></div>
            </div>

            <div class="bacaSupabase">
                <label>Tempat Lahir</label>
                <div id="tempatTersimpan"></div>
            </div>
        </div>
    </div>

</div>


</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
<script src="script/simpan.js"></script>

<script>
function bukaTab(idTab) {

    document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
    });

    document.getElementById(idTab).classList.add('active');

    event.target.classList.add('active');
}
</script>
</html>
