<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kamus Istilah Web Development</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0e16;--bg-card:#161923;--bg-card-hover:#1c2030;
  --bg-code:#0d0f18;--bg-explain:#141824;
  --border:rgba(255,255,255,.06);--border-hover:rgba(255,255,255,.13);
  --text:#e2e8f0;--text-dim:#8892a8;--text-muted:#4e5870;
  --accent:#ff7849;--accent-soft:rgba(255,120,73,.12);
  /* Syntax Highlighting Colors */
  --sk:#ff7849;--ss:#a5d6a7;--sc:#4e5870;--sn:#fbbf24;--sm:#67e8f9;--stag:#38bdf8;
}
html{scroll-behavior:smooth}
body{
  font-family:'Space Grotesk',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;padding:24px 16px 80px;overflow-x:hidden;
}

/* === Latar belakang animasi === */
.blob{position:fixed;border-radius:50%;filter:blur(120px);opacity:.13;pointer-events:none;z-index:0}
.blob-1{width:500px;height:500px;background:#ff7849;top:-120px;left:-100px;animation:bfloat 22s ease-in-out infinite}
.blob-2{width:450px;height:450px;background:#2dd4bf;bottom:-80px;right:-80px;animation:bfloat 26s ease-in-out infinite reverse}
.blob-3{width:350px;height:350px;background:#f472b6;bottom:20%;left:40%;animation:bfloat 30s ease-in-out infinite 3s}
@keyframes bfloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.08)}66%{transform:translate(-30px,25px) scale(.94)}}

.container{max-width:820px;margin:0 auto;position:relative;z-index:1}

/* === Header === */
.header{text-align:center;margin-bottom:28px}
.header h1{font-size:30px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.header h1 .icon{margin-right:6px}
.badge{
  display:inline-block;background:var(--accent-soft);color:var(--accent);
  font-size:13px;font-weight:600;padding:3px 14px;border-radius:30px;
}
.subtitle{color:var(--text-dim);font-size:14px;margin-top:8px;font-weight:300}

/* === Pencarian === */
.search-wrap{position:relative;margin-bottom:18px}
.search-wrap svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;transition:color .2s}
.search-wrap:focus-within svg{color:var(--accent)}
.search{
  width:100%;padding:14px 16px 14px 48px;border:1px solid var(--border);
  border-radius:14px;font-size:15px;background:var(--bg-card);
  color:var(--text);font-family:inherit;transition:border .2s,box-shadow .2s;
}
.search::placeholder{color:var(--text-muted)}
.search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}

/* === Tab kategori === */
.tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:7px 16px;border-radius:30px;font-size:13px;font-weight:500;
  background:var(--bg-card);color:var(--text-dim);border:1px solid var(--border);
  cursor:pointer;transition:all .2s;user-select:none;white-space:nowrap;
}
.tab:hover{border-color:var(--border-hover);color:var(--text);transform:translateY(-1px)}
.tab.active{color:#fff;border-color:transparent}

/* === Info hasil === */
.info{font-size:13px;color:var(--text-muted);margin-bottom:14px;padding-left:4px}

/* === Kartu === */
.cards{display:flex;flex-direction:column;gap:10px}
.card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:16px;
  cursor:pointer;transition:all .25s;overflow:hidden;
  animation:cardIn .35s ease both;
}
.card:hover{border-color:var(--border-hover);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.card.expanded{cursor:default}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.card-top{padding:18px 20px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.card-left{flex:1;min-width:0}
.term{font-size:17px;font-weight:700;margin-bottom:3px}
.def{font-size:13.5px;color:var(--text-dim);line-height:1.55}
.tag{
  flex-shrink:0;font-size:11px;font-weight:600;padding:4px 11px;
  border-radius:20px;letter-spacing:.3px;white-space:nowrap;margin-top:2px;
}
.card-hint{
  padding:0 20px 12px;font-size:12px;color:var(--text-muted);
  display:flex;align-items:center;gap:4px;transition:opacity .2s;
}
.card-hint svg{width:14px;height:14px;transition:transform .3s}
.card.expanded .card-hint{opacity:0;height:0;padding:0;overflow:hidden}
.card.expanded .card-hint svg{transform:rotate(180deg)}

/* === Expand/collapse dengan grid === */
.card-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s ease}
.card.expanded .card-body{grid-template-rows:1fr}
.card-body-inner{overflow:hidden}
.card-body-content{padding:0 20px 18px}

.explain{
  background:var(--bg-explain);padding:10px 14px;border-radius:10px;
  font-size:13.5px;line-height:1.6;margin-bottom:12px;
  border-left:3px solid var(--accent);
}
.explain-label{font-weight:600;color:var(--accent);margin-right:6px}

.example-label{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-dim);margin-bottom:6px}
.code-block{
  background:var(--bg-code);padding:14px 16px;border-radius:10px;
  font-family:'JetBrains Mono','Fira Code',Consolas,monospace;
  font-size:12.5px;line-height:1.7;overflow-x:auto;
  border:1px solid var(--border);white-space:pre-wrap;word-break:break-word;
}
/* Syntax Colors */
.code-block .kw{color:var(--sk);font-weight:500} /* Keyword JS */
.code-block .st{color:var(--ss)} /* String */
.code-block .cm{color:var(--sc);font-style:italic} /* Comment */
.code-block .nm{color:var(--sn)} /* Number/Tag Name */
.code-block .mt{color:var(--sm)} /* Method/Property */
.code-block .tg{color:var(--stag)} /* HTML Tag */

/* === State kosong === */
.empty{text-align:center;padding:50px 20px;color:var(--text-muted)}
.empty .big{font-size:40px;display:block;margin-bottom:12px;opacity:.6}
.empty strong{color:var(--text-dim)}

/* === Tombol ke atas === */
.to-top{
  position:fixed;bottom:28px;right:28px;width:44px;height:44px;
  border-radius:50%;background:var(--accent);color:#fff;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(255,120,73,.35);
  opacity:0;transform:translateY(12px);transition:all .3s;z-index:50;
}
.to-top.show{opacity:1;transform:translateY(0)}
.to-top:hover{transform:translateY(-2px) scale(1.05);box-shadow:0 6px 28px rgba(255,120,73,.45)}

/* === Footer === */
.footer{text-align:center;margin-top:40px;font-size:12px;color:var(--text-muted);font-weight:300}

/* === Responsif === */
@media(max-width:600px){
  .header h1{font-size:24px}
  .card-top{padding:14px 16px 10px}
  .card-body-content{padding:0 16px 14px}
  .code-block{font-size:11.5px;padding:10px 12px}
  .explain{font-size:13px;padding:8px 12px}
  .term{font-size:15.5px}
}
@media(prefers-reduced-motion:reduce){
  .blob,.card{animation:none!important}
  .card-body{transition:none!important}
}
</style>
</head>

<div class="container">
  <header class="header">
    <h1><span class="icon">&#x1F4D6;</span>Kamus Web Dev</h1>

  // ── KONSEP ──
  {nama:"Interpreter",kat:"Konsep",
   arti:"Program yang membaca dan mengeksekusi kode baris demi baris.",
   jelas:"Berbeda dengan compiler yang mengubah semua kode jadi bahasa mesin dulu, interpreter menerjemahkan dan menjalankan kode saat dibaca. JavaScript di browser adalah interpreter (JIT Compiler).",
   contoh:"// Contoh alur Interpreter\nconsole.log('Satu'); // Jalankan baris 1\nconsole.log('Dua'); // Jalankan baris 2\n// Jika error di baris 2, baris 3 tidak akan jalan"},
  {nama:"Compiler",kat:"Konsep",
   arti:"Program yang menerjemahkan seluruh kode sumber menjadi bahasa mesin sebelum dijalankan.",
   jelas:"Compiler menganalisis seluruh kode, mengoptimalkan, dan menghasilkan file executable. Bahasa seperti C++ dan Rust menggunakan compiler.",
   contoh:"// Proses Compiler (Kode C++)\n// Source Code -> [Compiler] -> Program.exe\n// Baru kemudian Program.exe dijalankan user"},
  {nama:"Deklarasi",kat:"Konsep",
   arti:"Menciptakan referensi variabel atau fungsi dalam memori.",
   jelas:"Deklarasi memberitahu browser/JS bahwa sebuah nama variabel ada. Variabel yang dideklarasikan tapi tidak diisi nilainya akan bernilai `undefined`.",
   contoh:"// Deklarasi Variabel\nlet umur;\nvar nama;\nconst PI; // ERROR! const wajib langsung diisi\n\nconsole.log(umur); // undefined"},
  {nama:"Inisiasi (Inisialisasi)",kat:"Konsep",
   arti:"Memberikan nilai awal pada variabel saat pertama kali dibuat.",
   jelas:"Inisiasi bisa terjadi bersamaan dengan deklarasi atau terpisah. Memberi nilai awal penting agar variabel tidak berisi `undefined`.",
   contoh:"// Deklarasi + Inisiasi langsung\nlet skor = 0;\n\n// Deklarasi dulu, inisiasi kemudian\nlet pemain;\npemain = 'Budi'; // Inisiasi"},
  {nama:"Parser",kat:"Konsep",
   arti:"Bagian dari engine yang menganalisis struktur kode (Syntax).",
   jelas:"Parser memeriksa apakah kode mengikuti aturan tata bahasa (grammar). Jika ada salah ketik (syntax error), parser akan berhenti dan melempar error sebelum kode dijalankan.",
   contoh:"// Jika kita tulis:\nfunction tes() {\n  console.log('Halo'\n}\n// Parser melihat kurung kurawal tidak tutup, \n// lalu melempar SyntaxError."},
   {nama:"Runtime",kat:"Konsep",
 arti:"Lingkungan tempat JavaScript dijalankan.",
 jelas:"Runtime menyediakan fitur tambahan yang tidak ada di bahasa JavaScript itu sendiri, seperti DOM, Fetch API, localStorage, dan setTimeout. Browser dan Node.js adalah runtime yang berbeda.",
 contoh:"// Browser Runtime\nconsole.log(document.title);\n\n// Node.js Runtime\n// fs.readFile('data.txt')"},


{nama:"Execution Context",kat:"Konsep",
 arti:"Lingkungan tempat kode JavaScript dieksekusi.",
 jelas:"Saat kode berjalan, JavaScript membuat Execution Context yang berisi variabel, fungsi, dan nilai this. Ada Global Execution Context dan Function Execution Context.",
 contoh:"let nama = 'Budi';\n\nfunction salam() {\n  let pesan = 'Halo';\n}\n\n// Global Context\n// Function Context untuk salam()"},


{nama:"Call Stack",kat:"Konsep",
 arti:"Tumpukan yang menyimpan urutan pemanggilan fungsi.",
 jelas:"Setiap fungsi yang dipanggil masuk ke Call Stack. Setelah selesai dieksekusi, fungsi keluar dari stack. JavaScript menjalankan kode satu per satu dari atas stack.",
 contoh:"function satu() {\n  dua();\n}\n\nfunction dua() {\n  tiga();\n}\n\nfunction tiga() {\n  console.log('Jalan');\n}\n\nsatu();"},


{nama:"Event Loop",kat:"Konsep",
 arti:"Mekanisme yang mengatur kode sinkron dan asinkron.",
 jelas:"Event Loop terus memeriksa Call Stack dan Callback Queue. Jika stack kosong, callback dari queue akan dipindahkan ke stack untuk dijalankan.",
 contoh:"console.log('A');\n\nsetTimeout(() => {\n  console.log('B');\n}, 0);\n\nconsole.log('C');\n\n// Output: A C B"},


{nama:"Callback Queue",kat:"Konsep",
 arti:"Antrian yang menyimpan callback yang menunggu dijalankan.",
 jelas:"Ketika operasi asinkron selesai, callback tidak langsung dijalankan. Callback masuk ke Queue dan menunggu Call Stack kosong.",
 contoh:"setTimeout(() => {\n  console.log('Selesai');\n}, 1000);\n\n// Setelah 1 detik callback masuk ke Queue"},


{nama:"Memory Heap",kat:"Konsep",
 arti:"Area memori tempat objek dan data disimpan.",
 jelas:"Saat membuat object, array, atau function, JavaScript menyimpannya di Memory Heap. Variabel biasanya hanya menyimpan referensi menuju lokasi tersebut.",
 contoh:"let user = {\n  nama: 'Budi'\n};\n\n// Object disimpan di Heap\n// Variabel user menyimpan referensinya"},


{nama:"Garbage Collection",kat:"Konsep",
 arti:"Proses otomatis membersihkan memori yang tidak dipakai.",
 jelas:"JavaScript secara otomatis menghapus data yang sudah tidak memiliki referensi agar memori tidak penuh.",
 contoh:"let data = {\n  nama: 'Budi'\n};\n\ndata = null;\n\n// Object lama bisa dibersihkan Garbage Collector"},


{nama:"JIT Compiler",kat:"Konsep",
 arti:"Compiler yang bekerja saat program sedang berjalan.",
 jelas:"Mesin JavaScript modern seperti V8 menggunakan Just-In-Time Compiler untuk mengubah kode JavaScript menjadi kode mesin yang lebih cepat saat runtime.",
 contoh:"for(let i = 0; i < 1000; i++) {\n  console.log(i);\n}\n\n// Engine dapat mengoptimalkan kode yang sering dijalankan"},


{nama:"Single Thread",kat:"Konsep",
 arti:"JavaScript menjalankan satu tugas utama pada satu waktu.",
 jelas:"JavaScript hanya memiliki satu Call Stack utama. Karena itu Event Loop dan Web APIs digunakan agar operasi asinkron tetap memungkinkan.",
 contoh:"console.log('1');\nconsole.log('2');\nconsole.log('3');\n\n// Selalu berjalan berurutan"},


{nama:"Synchronous",kat:"Konsep",
 arti:"Eksekusi kode secara berurutan, menunggu baris sebelumnya selesai.",
 jelas:"Pada kode sinkron, setiap perintah harus selesai sebelum perintah berikutnya dijalankan.",
 contoh:"console.log('A');\nconsole.log('B');\nconsole.log('C');\n\n// Output: A B C"},


{nama:"Asynchronous",kat:"Konsep",
 arti:"Eksekusi yang memungkinkan tugas berjalan tanpa memblokir program utama.",
 jelas:"Operasi seperti fetch, setTimeout, dan membaca file dapat berjalan di luar Call Stack lalu kembali melalui callback atau promise.",
 contoh:"console.log('Mulai');\n\nsetTimeout(() => {\n  console.log('Selesai');\n}, 1000);\n\nconsole.log('Jalan Terus');"},


{nama:"Reference",kat:"Konsep",
 arti:"Alamat yang menunjuk ke lokasi data di memori.",
 jelas:"Object dan Array tidak disalin langsung. Variabel menyimpan referensi ke lokasi data yang sama di memori.",
 contoh:"let a = {nama:'Budi'};\nlet b = a;\n\nb.nama = 'Andi';\n\nconsole.log(a.nama);\n// 'Andi' karena menunjuk object yang sama"},

  // ── DASAR ──
  {nama:"Variabel",kat:"Dasar",
   arti:"Tempat menyimpan data menggunakan let, const, atau var.",
   jelas:"Variabel seperti kotak penyimpanan di memori. let untuk nilai yang berubah, const untuk nilai tetap, dan var adalah cara lama yang tidak direkomendasikan lagi.",
   contoh:"let nama = 'Budi';\nconst PI = 3.14;\n// var umur = 25; // hindari var"},
  {nama:"Operand",kat:"Dasar",
   arti:"Nilai atau variabel yang menjadi input bagi operator.",
   jelas:"Dalam operasi `5 + 3`, angka `5` dan `3` adalah operand. Operator adalah tanda `+`. Operand bisa berupa literal angka, string, atau variabel.",
   contoh:"let a = 10;  // a dan 10 adalah operand\nlet b = 5;   // b dan 5 adalah operand\nlet c = a + b; // a, b, dan + adalah operand/operator"},
  {nama:"Statement",kat:"Dasar",
   arti:"Satu baris perintah yang dijalankan oleh JavaScript.",
   jelas:"Setiap instruksi yang memberi perintah ke komputer adalah statement. Bisa berupa deklarasi, pemanggilan fungsi, atau pengulangan.",
   contoh:"let x = 5;           // statement deklarasi\nconsole.log(x);      // statement ekspresi\nif (x > 0) { ... }  // statement kontrol"},
  {nama:"Expression",kat:"Dasar",
   arti:"Kombinasi nilai, variabel, dan operator yang menghasilkan suatu nilai.",
   jelas:"Expression selalu menghasilkan nilai. Contoh: 2 + 3 menghasilkan 5. Setiap expression bisa digunakan di tempat yang membutuhkan nilai.",
   contoh:"let x = 5 + 3;            // 5+3 adalah expression\nlet y = x > 8 ? 'Ya' : 'Tidak';\nconsole.log(y);  // 'Tidak'"},
  {nama:"Operator",kat:"Dasar",
   arti:"Simbol yang melakukan operasi pada nilai atau variabel.",
   jelas:"Operator memproses operand (nilai input). Ada operator aritmatika (+, -, *, /), perbandingan (>, <, ===), logika (&&, ||, !), dan penugasan (=, +=).",
   contoh:"let a = 10, b = 3;\nconsole.log(a + b);  // 13\nconsole.log(a % b);  // 1 (sisa bagi)\nconsole.log(a > b);  // true"},
  {nama:"Boolean",kat:"Dasar",
   arti:"Tipe data yang hanya memiliki dua nilai: true atau false.",
   jelas:"Boolean digunakan untuk logika dan pengambilan keputusan. Hasil dari operasi perbandingan selalu berupa boolean.",
   contoh:"let aktif = true;\nconsole.log(5 > 3);    // true\nconsole.log(5 === 3);  // false\nconsole.log(!aktif);   // false"},
  {nama:"String",kat:"Dasar",
   arti:"Tipe data yang merepresentasikan teks.",
   jelas:"String adalah rangkaian karakter yang dibungkus dengan kutip tunggal ('), ganda (\"), atau backtick (`). Bisa berisi huruf, angka, atau simbol.",
   contoh:"let s1 = 'Halo';\nlet s2 = \"Dunia\";\nconsole.log(s1 + ' ' + s2); // 'Halo Dunia'\nconsole.log(s1.length);    // 4"},
  {nama:"Number",kat:"Dasar",
   arti:"Tipe data untuk angka, baik bulat maupun desimal.",
   jelas:"JavaScript hanya memiliki satu tipe Number untuk bilangan bulat dan desimal. Juga mencakup nilai khusus seperti Infinity dan -Infinity.",
   contoh:"let umur = 25;\nlet pi = 3.14;\nlet negatif = -10;\nconsole.log(umur + pi); // 28.14"},
  {nama:"NaN",kat:"Dasar",
   arti:"Not-a-Number — nilai khusus yang berarti 'bukan angka valid'.",
   jelas:"NaN muncul saat operasi matematika gagal, misalnya mengalikan string dengan angka. Uniknya, NaN tidak sama dengan dirinya sendiri.",
   contoh:"let hasil = 'abc' / 2;\nconsole.log(hasil);         // NaN\nconsole.log(NaN === NaN);  // false\nconsole.log(isNaN(hasil)); // true"},
  {nama:"Undefined",kat:"Dasar",
   arti:"Nilai otomatis untuk variabel yang dideklarasikan tapi belum diberi nilai.",
   jelas:"Undefined berarti 'belum didefinisikan'. Juga menjadi nilai balik default dari fungsi yang tidak memiliki return.",
   contoh:"let x;\nconsole.log(x);  // undefined\nconsole.log(typeof x); // 'undefined'\n\nfunction kosong() {}\nconsole.log(kosong()); // undefined"},
  {nama:"Null",kat:"Dasar",
   arti:"Nilai yang sengaja diberikan untuk menandakan 'tidak ada data'.",
   jelas:"Berbeda dengan undefined yang otomatis, null diberikan secara sadar oleh programmer untuk menunjukkan ketiadaan nilai. Mengejutkannya, typeof null adalah 'object'.",
   contoh:"let data = null;\nconsole.log(data);        // null\nconsole.log(typeof null); // 'object' (bug klasik JS)"},
  {nama:"typeof",kat:"Dasar",
   arti:"Operator untuk mengecek tipe data suatu nilai.",
   jelas:"typeof mengembalikan string yang menyebutkan tipe data. Berguna untuk debugging dan validasi, meskipun ada beberapa hasil yang mengejutkan.",
   contoh:"console.log(typeof 42);       // 'number'\nconsole.log(typeof 'halo');    // 'string'\nconsole.log(typeof true);     // 'boolean'\nconsole.log(typeof null);     // 'object' (hati-hati!)"},
  {nama:"Type Coercion",kat:"Dasar",
   arti:"Konversi otomatis tipe data oleh JavaScript saat operasi.",
   jelas:"JS secara diam-diam mengubah tipe data agar operasi bisa berjalan. Ini sering menimbulkan bug yang sulit ditemukan, terutama saat mencampur string dan angka.",
   contoh:"console.log('5' + 3);   // '53' (angka jadi string)\nconsole.log('5' - 3);   // 2    (string jadi angka)\nconsole.log('5' * '2'); // 10   (keduanya jadi angka)\nconsole.log(true + 1);  // 2    (true jadi 1)"},
  {nama:"Strict Equality",kat:"Dasar",
   arti:"Perbandingan dengan === yang memeriksa nilai DAN tipe data.",
   jelas:"Selalu gunakan === daripada ==. Operator == melakukan type coercion yang bisa menghasilkan perbandingan menyesatkan, sedangkan === lebih prediktabel.",
   contoh:"console.log(5 === '5');   // false (beda tipe)\nconsole.log(5 == '5');    // true  (coercion! bahaya)\nconsole.log(0 === false); // false\nconsole.log(0 == false);  // true  (bahaya)"},
  {nama:"Truthy & Falsy",kat:"Dasar",
   arti:"Nilai yang dianggap true atau false dalam kondisi boolean.",
   jelas:"Hanya 7 nilai falsy: false, 0, -0, 0n, '', null, undefined, NaN. Semua nilai lainnya truthy, termasuk [], {}, dan 'false' (string).",
   contoh:"if ('hello') console.log('truthy'); // tercetak\nif (0) console.log('falsy');     // tidak tercetak\nif ([]) console.log('truthy');   // tercetak! array kosong truthy"},

  // ── PERCABANGAN & LOOP ──
  {nama:"Condition",kat:"Percabangan & Loop",
   arti:"Percabangan logika menggunakan if, else if, else, atau switch.",
   jelas:"Condition memungkinkan program menjalankan kode berbeda berdasarkan kondisi. if/else untuk percabangan sederhana, switch untuk banyak kasus tetap.",
   contoh:"let nilai = 85;\nif (nilai >= 80) {\n  console.log('A');\n} else if (nilai >= 70) {\n  console.log('B');\n} else {\n  console.log('C');\n}"},
  {nama:"Loop",kat:"Percabangan & Loop",
   arti:"Struktur untuk mengulang eksekusi blok kode.",
   jelas:"for untuk pengulangan terhitung, while untuk pengulangan bersyarat. Gunakan break untuk keluar lebih awal atau continue untuk skip iterasi.",
   contoh:"for (let i = 0; i < 5; i++) {\n  if (i === 2) continue; // skip 2\n  console.log(i); // 0,1,3,4\n}\n\nlet j = 0;\nwhile (j < 3) {\n  console.log(j);\n  j++;\n}"},
  {nama:"for...of",kat:"Percabangan & Loop",
   arti:"Loop khusus untuk mengiterasi nilai di iterable (array, string, dll).",
   jelas:"for...of lebih bersih dari for biasa untuk array karena langsung memberikan nilainya, bukan indeksnya. Tidak bisa digunakan untuk object biasa.",
   contoh:"let buah = ['Apel', 'Mangga', 'Jeruk'];\nfor (const item of buah) {\n  console.log(item);\n}\n// 'Apel', 'Mangga', 'Jeruk'\n\nfor (const ch of 'Hi!') {\n  console.log(ch); // 'H', 'i', '!'\n}"},
  {nama:"Ternary Operator",kat:"Percabangan & Loop",
   arti:"Shortcut if/else dalam satu baris menggunakan ? dan :.",
   jelas:"Ternary berguna untuk menetapkan nilai berdasarkan kondisi singkat. Jangan nested terlalu dalam karena jadi sulit dibaca.",
   contoh:"let umur = 20;\nlet status = umur >= 17 ? 'Dewasa' : 'Anak-anak';\nconsole.log(status); // 'Dewasa'\n\n// Sama seperti:\n// let status;\n// if (umur >= 17) status = 'Dewasa';\n// else status = 'Anak-anak';"},

  // ── FUNGSI ──
  {nama:"Function",kat:"Fungsi",
   arti:"Blok kode yang diberi nama dan bisa dipanggil berulang kali.",
   jelas:"Fungsi membantu mengorganisir kode menjadi unit yang bisa dipanggil kapan saja. Mencegah pengulangan kode dan mempermudah pemeliharaan.",
   contoh:"function sapa(nama) {\n  return 'Halo, ' + nama + '!';\n}\nconsole.log(sapa('Ana')); // 'Halo, Ana!'\nconsole.log(sapa('Budi')); // 'Halo, Budi!'"},
  {nama:"Arrow Function",kat:"Fungsi",
   arti:"Cara menulis fungsi yang lebih ringkas menggunakan tanda =>.",
   jelas:"Arrow function tidak memiliki this sendiri (mewarisi dari lingkungan), tidak bisa digunakan sebagai constructor, dan tidak memiliki objek arguments.",
   contoh:"// Tanpa parameter\nconst hi = () => 'Halo!';\n\n// Satu parameter (boleh tanpa kurung)\nconst kuadrat = x => x * x;\n\n// Banyak parameter\nconst tambah = (a, b) => a + b;\n\nconsole.log(kuadrat(4));   // 16\nconsole.log(tambah(3, 7)); // 10"},
  {nama:"Parameter",kat:"Fungsi",
   arti:"Variabel yang dideklarasikan di dalam tanda kurung fungsi.",
   jelas:"Parameter adalah 'slot' yang menunggu diisi saat fungsi dipanggil. Bertindak sebagai variabel lokal di dalam fungsi.",
   contoh:"function hitung(a, b, c) {\n  // a, b, c adalah parameter\n  return (a + b) * c;\n}"},
  {nama:"Argumen",kat:"Fungsi",
   arti:"Nilai nyata yang dikirimkan saat memanggil sebuah fungsi.",
   jelas:"Argumen adalah nilai aktual yang mengisi parameter. Jumlah argumen bisa lebih atau kurang dari parameter — kelebihan diabaikan, kekurangan menjadi undefined.",
   contoh:"function tambah(a, b) { return a + b; }\n\n// 3 dan 5 adalah argumen\nconsole.log(tambah(3, 5)); // 8\n\n// Argumen kurang\nconsole.log(tambah(3)); // NaN (b = undefined)"},
  {nama:"Return",kat:"Fungsi",
   arti:"Keyword untuk mengembalikan nilai dari fungsi ke pemanggil.",
   jelas:"return menghentikan eksekusi fungsi dan mengirimkan nilai. Fungsi tanpa return mengembalikan undefined. Bisa mengembalikan nilai apa pun termasuk fungsi lain.",
   contoh:"function kali(a, b) {\n  return a * b; // nilai dikembalikan\n  console.log('tidak pernah jalan');\n}\nlet hasil = kali(4, 5);\nconsole.log(hasil); // 20"},
  {nama:"Callback",kat:"Fungsi",
   arti:"Fungsi yang dikirim sebagai argumen dan dipanggil kemudian.",
   jelas:"Callback umum di JavaScript, terutama untuk operasi asinkron. Fungsi 'memanggil kembali' callback saat tugas tertentu selesai.",
   contoh:"function proses(data, selesai) {\n  let hasil = data.toUpperCase();\n  selesai(hasil); // memanggil callback\n}\n\nproses('halo', function(hasil) {\n  console.log(hasil); // 'HALO'\n});"},
  {nama:"Default Parameter",kat:"Fungsi",
   arti:"Nilai bawaan untuk parameter jika argumen tidak diberikan.",
   jelas:"Default parameter menghindari error saat argumen tidak diberikan. Nilai default hanya digunakan jika argumen bernilai undefined (bukan null atau falsy lainnya).",
   contoh:"function greet(nama = 'Tamu') {\n  console.log('Halo, ' + nama);\n}\ngreet();          // 'Halo, Tamu'\ngreet('Rina');    // 'Halo, Rina'\ngreet(undefined); // 'Halo, Tamu'"},
  {nama:"Closure",kat:"Fungsi",
   arti:"Fungsi yang mengingat variabel dari scope di mana ia dibuat.",
   jelas:"Closure terjadi saat fungsi dalam fungsi mengakses variabel fungsi luarnya, bahkan setelah fungsi luar selesai. Berguna untuk data privat dan factory function.",
   contoh:"function buatCounter() {\n  let count = 0;\n  return function() {\n    count++;\n    return count;\n  };\n}\nconst c = buatCounter();\nconsole.log(c()); // 1\nconsole.log(c()); // 2\n// count tersembunyi, hanya bisa diakses via c()"},
  {nama:"Scope",kat:"Fungsi",
   arti:"Wilayah di mana variabel dapat diakses dalam kode.",
   jelas:"Scope menentukan visibilitas variabel. JavaScript memiliki global scope, function scope, dan block scope (dengan let/const). Variabel hanya bisa diakses di dalam scope-nya.",
   contoh:"let globalVar = 'aku global';\n\nfunction test() {\n  let localVar = 'aku lokal';\n  console.log(globalVar); // bisa\n  console.log(localVar);  // bisa\n}\ntest();\nconsole.log(globalVar); // bisa\n// console.log(localVar); // ERROR!"},

/* =============================================
   SYNTAX HIGHLIGHTER SEDERHANA (FIXED)
   ============================================= */
function highlight(code) {
  // 1. Escape HTML characters
  code = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // 2. Highlight HTML Tags safely using placeholders
  // Kita ganti tag HTML menjadi placeholder dulu agar tidak ikut diproses regex berikutnya
  code = code.replace(/(&lt;\/?)([\w-]+)/g, '$1__TAG_START__$2__TAG_END__');

  // 3. Tokenisasi komentar dan string (JS & CSS strings)
  const tokens = [];
  let tid = 0;
  
  // Simpan string dan komentar agar tidak diwarnai sebagai keyword
  code = code.replace(/(\/\/[^\n]*|'(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*"|`(?:[^`\\]|\\.)*`)/g, m => {
    const id = `__T${tid++}__`;
    const cls = m.startsWith('//') ? 'cm' : 'st';
    tokens.push({id, html:`<span class="${cls}">${m}</span>`});
    return id;
  });

  // 4. Keyword & Properties (JS & CSS Common)
  const jsKws = 'let|const|var|function|return|if|else|for|while|do|class|new|this|try|catch|throw|finally|async|await|import|export|from|typeof|instanceof|null|undefined|true|false|switch|case|break|continue|default|of|in|extends|super|static|yield|console';
  const cssProps = 'color|background|margin|padding|border|width|height|display|flex|grid|position|top|left|right|bottom|font-size|font-weight|text-align|justify-content|align-items';
  
  const kws = `${jsKws}|${cssProps}`;
  code = code.replace(new RegExp(`\\b(${kws})\\b`,'g'), '<span class="kw">$1</span>');

  // 5. Angka
  code = code.replace(/\b(\d+\.?\d*)\b/g, '<span class="nm">$1</span>');

  // 6. Restore token (String & Comments)
  tokens.forEach(t => { code = code.replace(t.id, t.html); });
  
  // 7. Restore HTML Tag Placeholders
  // Mengganti placeholder kembali menjadi tag HTML berwarna
  code = code.replace(/__TAG_START__/g, '<span class="nm">');
  code = code.replace(/__TAG_END__/g, '</span>');
  
  return code;
}

   ============================================= */
function renderTabs() {
  $tabs.innerHTML = daftarKat.map(k => {
    const isActive = k === activeKat;
    const config = katConfig[k];
    let style = '';
    
    if (isActive && k !== 'Semua' && config) {
      style = `background:${config.warna};color:#fff;border-color:transparent;box-shadow:0 4px 12px ${config.bg}`;
    } else if (isActive) {
      style = `background:var(--accent);color:#fff;border-color:transparent`;
    }

    return `<button class="tab${isActive?' active':''}" data-kat="${k}" style="${style}">${k}</button>`;
  }).join('');
}

 $tabs.addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  activeKat = btn.dataset.kat;
  renderTabs();
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
});

/* =============================================
   RENDER KARTU (DENGAN PENCARIAN LENGKAP)
   ============================================= */
function render() {
  const q = $search.value.toLowerCase().trim();

  // Filter berdasarkan kategori
  let data = activeKat === 'Semua' ? [...istilah] : istilah.filter(i => i.kat === activeKat);

  // Filter berdasarkan pencarian (Nama, Arti, Penjelasan, Contoh)
  if (q) {
  data = data.filter(i =>
    i.nama.toLowerCase().includes(q)
  );
}

  // Info jumlah
  $info.textContent = `Menampilkan ${data.length} istilah`;

  // State kosong
  if (data.length === 0) {
    $cards.innerHTML = `<div class="empty"><span class="big">&#x1F50D;</span>Tidak ada istilah yang cocok dengan "<strong>${$search.value}</strong>"</div>`;
    return;
  }

  // Render kartu
  $cards.innerHTML = data.map((item, i) => {
    const c = katConfig[item.kat] || {warna:'#94a3b8', bg:'rgba(148,163,184,.12)'};
    const delay = Math.min(i * 30, 400);
    return `
    <div class="card" style="animation-delay:${delay}ms;border-left:3px solid ${c.warna}30" data-i="${istilah.indexOf(item)}">
      <div class="card-top" onclick="toggle(this)">
        <div class="card-left">
          <div class="term" style="color:${c.warna}">${item.nama}</div>
          <div class="def">${item.arti}</div>
        </div>
        <span class="tag" style="background:${c.bg};color:${c.warna}">${item.kat}</span>
      </div>
      <div class="card-hint" onclick="toggle(this.parentElement)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        Klik untuk detail
      </div>
      <div class="card-body">
        <div class="card-body-inner">
          <div class="card-body-content">
            <div class="explain">
              <span class="explain-label">Penjelasan:</span>${item.jelas}
            </div>
            <div class="example-label">Contoh Kode</div>
            <div class="code-block">${highlight(item.contoh)}</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* Toggle expand/collapse */
function toggle(el) {
  const card = el.closest('.card');
  if (!card) return;
  card.classList.toggle('expanded');
}

/* =============================================
   PENCARIAN
   ============================================= */
 $search.addEventListener('input', render);
 $search.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    $search.value = '';
    render();
    $search.blur();
  }
});

/* =============================================
   TOMBOL KEMBALI KE ATAS
   ============================================= */
window.addEventListener('scroll', () => {
  $toTop.classList.toggle('show', window.scrollY > 400);
}, {passive: true});
 $toTop.addEventListener('click', () => {
  window.scrollTo({top: 0, behavior: 'smooth'});
});

/* =============================================
   INISIALISASI
   ============================================= */
 $totalBadge.textContent = istilah.length + ' istilah';
renderTabs();
render();
</script>
</body>
</html>
